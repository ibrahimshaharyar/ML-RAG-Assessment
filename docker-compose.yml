version: "3.9"

services:
  rag-app:
    build: .
    container_name: ml-rag-assessment
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist ChromaDB data between container restarts
      - ./chroma_db:/app/chroma_db
      # Mount knowledge base docs so you can add files without rebuilding
      - ./knowledge_base:/app/knowledge_base
    restart: unless-stopped
