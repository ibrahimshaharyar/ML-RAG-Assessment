<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #ececec;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.18);
      --user-bubble: #1e1b40;
      --bot-bubble: #1a1a1a;
      --input-bg: #1e1e1e;
      --radius: 14px;
      --send-size: 38px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Layout ─────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ─── Header ─────────────────────── */
    header {
      padding: 18px 24px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    header span { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* ─── Chat area ───────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Welcome state ───────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 14px;
      animation: fadeIn 0.5s ease;
    }

    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 40px var(--accent-glow);
    }

    #welcome h2 {
      font-size: 26px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff 40%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #welcome p { font-size: 14px; color: var(--text-muted); max-width: 340px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .suggestion-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .suggestion-chip:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--text);
    }

    /* ─── Messages ────────────────────── */
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      animation: slideUp 0.25s ease;
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
    }

    .message.bot .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: 72%;
      padding: 13px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2e2a5a;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ─── Sources badge ───────────────── */
    .sources {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }

    .source-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
    }

    /* ─── Typing indicator ────────────── */
    .typing-dots {
      display: flex; gap: 5px; padding: 6px 2px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ─── Input bar ───────────────────── */
    #input-area {
      padding: 16px 20px 22px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #question {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 140px;
      min-height: 22px;
      line-height: 1.5;
    }

    #question::placeholder { color: var(--text-muted); }

    #send-btn {
      width: var(--send-size); height: var(--send-size);
      background: var(--accent);
      border: none; border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #send-btn:hover { background: #6a58e0; transform: scale(1.05); }
    #send-btn:disabled { background: var(--surface2); cursor: not-allowed; transform: none; }

    #send-btn svg { width: 17px; height: 17px; fill: #fff; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ─── Animations ──────────────────── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">✦</div>
    <h1>Support Assistant</h1>
    <span>Powered by Llama 3 · ChromaDB</span>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>How can I help you?</h2>
      <p>Ask me anything about your account, billing, API, integrations, or security.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I reset my password?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What are the rate limits?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I set up 2FA?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What is your refund policy?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I generate an API key?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I invite a team member?</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="question" rows="1" placeholder="Ask a question…"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint">Answers are generated from the company knowledge base.</p>
  </div>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const welcomeEl = document.getElementById('welcome');
  const textarea = document.getElementById('question');
  const sendBtn = document.getElementById('send-btn');

  // Auto-resize textarea
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    textarea.value = btn.textContent;
    sendMessage();
  }

  function appendMessage(role, content, sources = []) {
    if (welcomeEl) welcomeEl.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (content === '__typing__') {
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      msg.id = 'typing-msg';
    } else {
      bubble.textContent = content;
      if (sources.length > 0) {
        const sourcesDiv = document.createElement('div');
        sourcesDiv.className = 'sources';
        sources.forEach(s => {
          const tag = document.createElement('span');
          tag.className = 'source-tag';
          tag.textContent = '📄 ' + s.replace('.md', '').replace(/_/g, ' ').replace(/^\d+\s*/, '');
          sourcesDiv.appendChild(tag);
        });
        bubble.appendChild(sourcesDiv);
      }
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
    return msg;
  }

  async function sendMessage() {
    const question = textarea.value.trim();
    if (!question) return;

    textarea.value = '';
    textarea.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    const typingMsg = appendMessage('bot', '__typing__');

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      const data = await res.json();
      typingMsg.remove();

      if (data.answer) {
        appendMessage('bot', data.answer, data.sources || []);
      } else {
        appendMessage('bot', 'Sorry, something went wrong. Please try again.');
      }
    } catch (err) {
      typingMsg.remove();
      appendMessage('bot', 'Could not reach the server. Is the API running?');
    }

    sendBtn.disabled = false;
    textarea.focus();
  }
</script>
</body>
</html>
